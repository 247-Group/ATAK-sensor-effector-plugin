name: CI — Build APK, Run Tests, Python Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  android-build:
    runs-on: ubuntu-latest
    name: Android Build & Tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew test

      - name: Run lint checks
        run: ./gradlew lint
        continue-on-error: true

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Build release APK (signed)
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        if: env.KEYSTORE_B64 != ''
        run: |
          echo "$KEYSTORE_B64" | base64 --decode > /tmp/sensor-effector.keystore
          KEYSTORE_FILE=/tmp/sensor-effector.keystore ./gradlew assembleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
        continue-on-error: true

  python-tests:
    runs-on: ubuntu-latest
    name: Python Pipeline Tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate test dataset
        run: python pipeline/synthetic_threat_generator.py --output data/synthetic/threat_events.parquet --per-class 5000 --seed 42 --json-export

      - name: Run pipeline tests
        run: python -m pytest tests/ -v --tb=short -x
        env:
          PYTHONPATH: .
